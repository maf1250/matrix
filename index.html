<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الجدولة الذكي V5.0 - المحرك الاحترافي</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body { background-color: #f8fafc; color: #1e293b; margin: 0; padding: 40px 20px; display: flex; justify-content: center; }
        .container { background-color: #fff; padding: 35px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 850px; width: 100%; }
        h1 { text-align: center; color: #0f766e; font-size: 26px; margin-bottom: 25px; font-weight: 800; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; }
        .upload-group { margin-bottom: 20px; background: #fdfdfd; border: 2px dashed #14b8a6; padding: 20px; border-radius: 10px; }
        .upload-group label { display: flex; align-items: center; font-weight: 700; margin-bottom: 12px; color: #0f766e; gap: 10px; }
        input[type="file"] { width: 100%; font-family: inherit; }
        
        .advanced-settings { background: #f0fdfa; border: 1px solid #ccfbf1; padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        .advanced-settings summary { font-weight: 800; color: #134e4a; cursor: pointer; outline: none; list-style: none; display: flex; justify-content: space-between; }
        .settings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .settings-grid div { display: flex; flex-direction: column; }
        .settings-grid label { font-size: 13px; font-weight: 600; color: #0f766e; margin-bottom: 5px; }
        .settings-grid input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; text-align: center; }

        .btn-process { background-color: #0d9488; color: #fff; border: none; padding: 18px 25px; width: 100%; border-radius: 10px; font-size: 18px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .btn-process:hover { background-color: #0f766e; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(13,148,136,0.2); }
        .btn-process:disabled { background-color: #94a3b8; cursor: not-allowed; transform: none; }
        
        .status-msg { text-align: center; margin-top: 20px; font-weight: 700; color: #0f766e; }
        .loader { display: none; width: 22px; height: 22px; border: 3px solid #FFF; border-bottom-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1>النظام الذكي لجدولة المتدربين V5.0</h1>

    <details class="advanced-settings">
        <summary>⚙️ إعدادات أعمدة البيانات (تحكم كامل)</summary>
        <div class="settings-grid">
            <div><label>عمود المتدرب</label><input type="text" id="col_trainee_id" value="الرقم"></div>
            <div><label>عمود المقرر</label><input type="text" id="col_course" value="المقرر"></div>
            <div><label>الرقم المرجعي</label><input type="text" id="col_crn" value="الرقم المرجعي"></div>
            <div><label>نوع الجدولة</label><input type="text" id="col_type" value="نوع الجدولة"></div>
            <div><label>الوقت</label><input type="text" id="col_time" value="الوقت"></div>
            <div><label>اليوم</label><input type="text" id="col_day" value="اليوم"></div>
            <div><label>المتبقي</label><input type="text" id="col_rem" value="متبقي"></div>
        </div>
    </details>

    <div class="upload-group">
        <label>📁 1. ملف مصفوفة التسجيل (المتوقع)</label>
        <input type="file" id="traineesFile" accept=".xlsx, .xls">
    </div>

    <div class="upload-group">
        <label>📊 2. تقرير جداول الوحدة (SS01)</label>
        <input type="file" id="ss01File" accept=".csv, .xlsx, .xls">
    </div>

    <button class="btn-process" id="processBtn" onclick="startProcessing()">
        <span class="loader" id="loader"></span>
        <span id="btnText">معالجة وبناء الجداول باحترافية</span>
    </button>

    <div id="status" class="status-msg"></div>
</div>

<script>
    // --- Constants ---
    const DAYS_MAP = { 'الأحد':0, 'الاحد':0, 'الإثنين':1, 'الاثنين':1, 'الثلاثاء':2, 'الأربعاء':3, 'الاربعاء':3, 'الخميس':4, 'الجمعة':5, 'السبت':6 };
    const REVERSE_DAYS = { 0: 'الأحد', 1: 'الإثنين', 2: 'الثلاثاء', 3: 'الأربعاء', 4: 'الخميس', 5: 'الجمعة', 6: 'السبت' };

    // --- Core Logic Helpers ---
    function parseDays(dayStr) {
        if (!dayStr) return [];
        let str = String(dayStr).replace(/\s/g, '');
        let res = [];
        for (let k in DAYS_MAP) { if (str.includes(k)) res.push(DAYS_MAP[k]); }
        return res;
    }

    function parseTimeRange(timeStr) {
        if (!timeStr || !timeStr.includes('-')) return null;
        let parts = timeStr.split('-');
        const toMin = (t) => {
            let m = t.match(/(\d+):(\d+)/);
            if (!m) return 0;
            let h = parseInt(m[1]), min = parseInt(m[2]);
            if (t.includes('م') && h < 12) h += 12;
            if (t.includes('ص') && h === 12) h = 0;
            return h * 60 + min;
        };
        return { start: toMin(parts[0]), end: toMin(parts[1]) };
    }

    function hasConflict(s1, s2) {
        if (!s1.timeData || !s2.timeData) return null;
        let overlap = s1.days.filter(d => s2.days.includes(d));
        if (overlap.length === 0) return null;
        if (s1.timeData.start < s2.timeData.end && s2.timeData.start < s1.timeData.end) return true;
        return false;
    }

    // --- Excel Professional Reader ---
    async function readExcelDetailed(file, targetHeader) {
        const data = new Uint8Array(await file.arrayBuffer());
        const wb = XLSX.read(data, { type: 'array' });
        const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: "" });
        
        let headerIdx = -1;
        for (let r = 0; r < json.length; r++) {
            if (json[r].some(c => String(c).trim() === targetHeader)) { headerIdx = r; break; }
        }
        if (headerIdx === -1) throw new Error(`لم يتم العثور على عمود: ${targetHeader}`);
        return { headers: json[headerIdx].map(h => String(h).trim()), rows: json.slice(headerIdx + 1) };
    }

    // --- The AI Engine ---
    let courseMap = {};
    let courseStats = {};
    let memoCombos = {};

    function getValidCombos(code, currentSched = []) {
        if (!courseMap[code]) return [];
        let types = Object.keys(courseMap[code]);
        let results = [];
        
        function helper(idx, current) {
            if (idx === types.length) { results.push([...current]); return; }
            let type = types[idx];
            for (let sec of courseMap[code][type]) {
                if (sec.remaining <= 0) continue;
                if (current.some(s => hasConflict(s, sec)) || currentSched.some(s => hasConflict(s, sec))) continue;
                current.push(sec);
                helper(idx + 1, current);
                current.pop();
            }
        }
        helper(0, []);
        // Branch Ordering (LCV): البدء بالخيارات الأكثر سعة
        return results.sort((a, b) => {
            let sumA = a.reduce((s, x) => s + x.remaining, 0);
            let sumB = b.reduce((s, x) => s + x.remaining, 0);
            return sumB - sumA;
        });
    }

    function calculateDiff(code) {
        if (!courseMap[code]) return 9999;
        let combos = memoCombos[code] || [];
        let seats = 0;
        for(let t in courseMap[code]) seats += courseMap[code][t].reduce((a,b)=>a+Math.max(0,b.remaining), 0);
        // المعادلة المطورة: (1 / (التوليفات * إجمالي المقاعد))
        return 1 / ((combos.length * seats) + 0.01);
    }

    async function startProcessing() {
        const trFile = document.getElementById('traineesFile').files[0];
        const ssFile = document.getElementById('ss01File').files[0];
        if (!trFile || !ssFile) return alert("يرجى إرفاق الملفات المطلوبة");

        const btn = document.getElementById('processBtn'), loader = document.getElementById('loader'), st = document.getElementById('status');
        btn.disabled = true; loader.style.display = 'inline-block'; st.innerText = "جاري تشغيل محرك CSP الاحترافي...";

        try {
            const C_ID = document.getElementById('col_trainee_id').value;
            const C_COURSE = document.getElementById('col_course').value;
            const C_CRN = document.getElementById('col_crn').value;
            const C_TYPE = document.getElementById('col_type').value;
            const C_TIME = document.getElementById('col_time').value;
            const C_DAY = document.getElementById('col_day').value;
            const C_REM = document.getElementById('col_rem').value;

            const trData = await readExcelDetailed(trFile, C_ID);
            const ssData = await readExcelDetailed(ssFile, C_COURSE);

            // 1. بناء هيكل البيانات وتخزين السعة الأصلية
            courseMap = {}; courseStats = {}; memoCombos = {};
            ssData.rows.forEach(r => {
                let code = r[ssData.headers.indexOf(C_COURSE)], crn = r[ssData.headers.indexOf(C_CRN)];
                if (!code || !crn) return;
                let type = r[ssData.headers.indexOf(C_TYPE)] || "نظري";
                let rem = parseInt(r[ssData.headers.indexOf(C_REM)]) || 0;
                if (!courseMap[code]) courseMap[code] = {};
                if (!courseMap[code][type]) courseMap[code][type] = [];
                courseMap[code][type].push({
                    code, crn, type, remaining: rem, originalRemaining: rem,
                    days: parseDays(r[ssData.headers.indexOf(C_DAY)]),
                    timeData: parseTimeRange(r[ssData.headers.indexOf(C_TIME)])
                });
                if(!courseStats[code]) courseStats[code] = { req:0, reg:0, unreg:0, reasons:{} };
            });

            // 2. حساب التوليفات مسبقاً (Pre-calculation) لتسريع البحث
            for (let code in courseMap) memoCombos[code] = getValidCombos(code);

            // 3. بناء قائمة المتدربين (MRV)
            let trainees = trData.rows.map(r => {
                let id = r[trData.headers.indexOf(C_ID)], req = [];
                if(!id) return null;
                trData.headers.forEach((h, idx) => { if (h !== C_ID && r[idx] == "1") req.push(h); });
                return { id, req };
            }).filter(t => t && t.req.length > 0);

            let finalSchedules = [], assignedCodesLog = [], rejectionLog = [];
            let globalStats = { total: trainees.length, full: 0, partial: 0, fail: 0 };

            // 4. حلقة الإسناد الذكية
            let queue = [...trainees];
            while (queue.length > 0) {
                // Dynamic MRV: إعادة فرز الطلاب بناءً على ندرة موادهم المتبقية في هذه اللحظة
                queue.sort((a, b) => {
                    let diffA = a.req.reduce((s, c) => s + calculateDiff(c), 0);
                    let diffB = b.req.reduce((s, c) => s + calculateDiff(c), 0);
                    return diffB - diffA;
                });

                let student = queue.shift();
                student.req.forEach(c => { if(courseStats[c]) courseStats[c].req++; });
                student.req.sort((a, b) => calculateDiff(b) - calculateDiff(a));

                let bestSchedule = [];
                let minPenalty = Infinity;

                function solve(idx, currentSched) {
                    if (idx === student.req.length) {
                        // Rare Seat Penalty: حساب عقوبة استهلاك مقاعد نادرة
                        let penalty = 0;
                        currentSched.forEach(s => { if(s.remaining <= 2) penalty += (5 - s.remaining); });
                        if (currentSched.length > bestSchedule.length || (currentSched.length === bestSchedule.length && penalty < minPenalty)) {
                            bestSchedule = [...currentSched];
                            minPenalty = penalty;
                        }
                        return;
                    }

                    let code = student.req[idx];
                    let combos = getValidCombos(code, currentSched);

                    for (let combo of combos) {
                        // Forward Checking: هل المواد القادمة لا تزال قابلة للحل؟
                        let canContinue = true;
                        for (let j = idx + 1; j < student.req.length; j++) {
                            if (getValidCombos(student.req[j], currentSched.concat(combo)).length === 0) {
                                // فحص هل السبب "امتلاء" أم "تعارض"
                                canContinue = false; break;
                            }
                        }

                        if (canContinue) {
                            solve(idx + 1, currentSched.concat(combo));
                            if (bestSchedule.length === student.req.length) return; // قمة المثالية
                        }
                    }
                    solve(idx + 1, currentSched); // تجربة تجاوز المادة
                }

                solve(0, []);

                // 5. التثبيت وتحديث الحالة
                let studentCrns = [], registeredCodes = [];
                bestSchedule.forEach(sec => {
                    sec.remaining--;
                    studentCrns.push(sec.crn);
                    if (!registeredCodes.includes(sec.code)) {
                        registeredCodes.push(sec.code);
                        courseStats[sec.code].reg++;
                    }
                });

                // 6. تشخيص دقيق للأعطال
                student.req.forEach(c => {
                    if (!registeredCodes.includes(c)) {
                        if (!courseStats[c]) {
    courseStats[c] = {
        req: 0,
        reg: 0,
        unreg: 0,
        reasons: {}
    };
}

courseStats[c].unreg++;
                        let reason = "تعارض مع الشعب المختارة";
                        if (!courseMap[c]) reason = "غير مطروح بالخطة";
                        else {
                            for (let type in courseMap[c]) {
                                if (courseMap[c][type].every(s => s.remaining <= 0)) reason = `امتلاء شعب الـ ${type}`;
                            }
                        }
                        rejectionLog.push({ [C_ID]: student.id, 'رمز المقرر': c, 'السبب بالتفصيل': reason });
                        courseStats[c].reasons[reason] = (courseStats[c].reasons[reason] || 0) + 1;
                    }
                });

                if (registeredCodes.length === student.req.length) globalStats.full++;
                else if (registeredCodes.length > 0) globalStats.partial++;
                else globalStats.fail++;

                let resRow = { [C_ID]: student.id };
                studentCrns.forEach((c, i) => resRow[`الرقم المرجعي ${i+1}`] = c);
                finalSchedules.push(resRow);
                assignedCodesLog.push({ [C_ID]: student.id, 'المقررات المعينة': registeredCodes.join(" ، ") });
            }

            // 7. تصدير التقارير (ExcelJS)
            const wb = new ExcelJS.Workbook();
            const exportWS = (name, data) => {
                if(!data || data.length === 0) return;
                const ws = wb.addWorksheet(name, { views: [{ rightToLeft: true, state: 'frozen', ySplit: 1 }] });
                ws.columns = Object.keys(data[0]).map(k => ({ header: k, key: k, width: 20 }));
                ws.addRows(data);
                ws.getRow(1).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF0D9488' } };
                ws.getRow(1).font = { color: { argb: 'FFFFFFFF' }, bold: true };
            };

            exportWS("جدول المتدربين", finalSchedules);
            exportWS("المقررات المعينة", assignedCodesLog);
            exportWS("أسباب الرفض والتعارض", rejectionLog);
            exportWS("تقرير السعات", Object.keys(courseMap).map(c => {
                let totalOrig = 0, totalRem = 0;
                for(let t in courseMap[c]) courseMap[c][t].forEach(s => { totalOrig += s.originalRemaining; totalRem += s.remaining; });
                return { 'رمز المقرر': c, 'السعة الأصلية': totalOrig, 'المعالجين': totalOrig - totalRem, 'المقاعد المتبقية': totalRem };
            }));
            exportWS("إحصائيات لكل مقرر", Object.keys(courseStats).map(c => ({
                'رمز المقرر': c, 'المتوقع': courseStats[c].req, 'تم التعيين': courseStats[c].reg, 'فشل': courseStats[c].unreg,
                'أبرز سبب للرفض': Object.keys(courseStats[c].reasons).reduce((a,b)=> courseStats[c].reasons[a]>courseStats[c].reasons[b]?a:b, "لا يوجد")
            })));
            exportWS("الشعب الممتلئة", Object.keys(courseMap).flatMap(c => Object.keys(courseMap[c]).flatMap(t => courseMap[c][t].filter(s=>s.remaining<=0).map(s=>({ 'رمز المقرر':c, 'المرجع':s.crn, 'النوع':t })))));
            exportWS("الإحصاء العام", [
                { 'البيان': 'إجمالي المتدربين', 'العدد': globalStats.total },
                { 'البيان': 'إسناد كامل', 'العدد': globalStats.full },
                { 'البيان': 'إسناد جزئي', 'العدد': globalStats.partial },
                { 'البيان': 'فشل تماماً', 'العدد': globalStats.fail }
            ]);

            const buffer = await wb.xlsx.writeBuffer();
            saveAs(new Blob([buffer]), `تقرير_الجداول_V5_${new Date().getTime()}.xlsx`);
            st.innerHTML = "<span style='color:green'>تم إنجاز المهمة بنجاح!</span>";

        } catch (e) {
            console.error(e);
            st.innerHTML = `<span style='color:red'>خطأ: ${e.message}</span>`;
        } finally {
            btn.disabled = false; loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
