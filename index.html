<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرك الجدولة الخبير V5 - CSP Solver</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #008e7e; --secondary: #8dc63f; --bg: #f4f9f8; --danger: #dc3545; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body { background-color: var(--bg); color: #333; margin: 0; padding: 20px; }
        .container { background-color: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 950px; margin: auto; }
        h1 { text-align: center; color: var(--primary); font-weight: 800; margin-bottom: 5px; }
        .version { text-align: center; color: var(--secondary); font-size: 14px; margin-bottom: 25px; font-weight: 700; }
        .card { background: #fafdfa; border: 2px dashed #c2e0d9; padding: 20px; border-radius: 10px; margin-bottom: 15px; }
        .card label { display: block; font-weight: 700; color: var(--primary); margin-bottom: 10px; }
        .btn-process { background-color: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: 10px; font-size: 20px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-process:hover { background-color: #006d60; transform: translateY(-2px); }
        .progress-box { margin-top: 25px; display: none; }
        .bar-container { background: #eee; height: 16px; border-radius: 10px; overflow: hidden; }
        .bar-fill { background: var(--secondary); width: 0%; height: 100%; transition: 0.2s; }
        .status-text { text-align: center; font-size: 14px; margin-top: 8px; color: var(--primary); font-weight: 700; }
        .settings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; padding: 10px; }
        .settings-grid input { width: 100%; padding: 5px; text-align: center; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>النظام الذكي لجدولة المتدربين (V5)</h1>
    <div class="version">CSP Inference Engine - Forward Checking & DVO</div>

    <details class="card">
        <summary style="cursor:pointer; font-weight:800; color:var(--primary)">⚙️ إعدادات الحقول (تخصيص كامل)</summary>
        <div class="settings-grid">
            <div><label>رقم المتدرب</label><input type="text" id="col_trainee_id" value="الرقم"></div>
            <div><label>رمز المقرر</label><input type="text" id="col_course" value="المقرر"></div>
            <div><label>الرقم المرجعي</label><input type="text" id="col_crn" value="الرقم المرجعي"></div>
            <div><label>الوقت</label><input type="text" id="col_time" value="الوقت"></div>
            <div><label>اليوم</label><input type="text" id="col_day" value="اليوم"></div>
            <div><label>المتبقي</label><input type="text" id="col_rem" value="متبقي"></div>
        </div>
    </details>

    <div class="card"><label>1. مصفوفة طلبات التسجيل (.xlsx)</label><input type="file" id="matrixFile"></div>
    <div class="card"><label>2. تقرير جداول الشعب SS01 (.xlsx)</label><input type="file" id="ss01File"></div>

    <button class="btn-process" id="processBtn" onclick="runInferenceEngine()">بدء المحرك الخبير</button>

    <div class="progress-box" id="progressBox">
        <div class="bar-container"><div class="bar-fill" id="barFill"></div></div>
        <div class="status-text" id="statusText">جاري تهيئة البيانات...</div>
    </div>
</div>

<script>
/** 
 * الإصدار V5 - محرك الاستدلال القيودي (Constraint Inference Engine)
 */

const DAYS_MAP = { 'الأحد':0, 'الاحد':0, 'الإثنين':1, 'الاثنين':1, 'الثلاثاء':2, 'الأربعاء':3, 'الاربعاء':3, 'الخميس':4 };
const SLOT_SIZE = 30;

// أدوات الوقت
const parseTimeRange = (tStr) => {
    if (!tStr) return null;
    let parts = String(tStr).split('-');
    if (parts.length < 2) return null;
    const toMin = (s) => {
        let m = s.match(/(\d+):(\d+)/);
        if (!m) return 0;
        let h = parseInt(m[1]), min = parseInt(m[2]);
        if (s.includes('م') && h < 12) h += 12;
        if (s.includes('ص') && h === 12) h = 0;
        return h * 60 + min;
    };
    return { start: toMin(parts[0]), end: toMin(parts[1]), str: tStr };
};

const getMask = (days, timeData) => {
    let masks = Array(5).fill(0n);
    if (!timeData) return masks;
    let durationMask = 0n;
    for (let i = Math.floor(timeData.start/SLOT_SIZE); i < Math.ceil(timeData.end/SLOT_SIZE); i++) 
        durationMask |= (1n << BigInt(i));
    days.forEach(d => { if(d in DAYS_MAP || (d>=0 && d<5)) masks[d] = durationMask; });
    return masks;
};

// المحرك الرئيسي
async function runInferenceEngine() {
    const startTime = performance.now();
    const files = { m: document.getElementById('matrixFile').files[0], s: document.getElementById('ss01File').files[0] };
    if (!files.m || !files.s) return alert("يرجى اختيار الملفات");

    const cols = {
        trainee: document.getElementById('col_trainee_id').value,
        course: document.getElementById('col_course').value,
        crn: document.getElementById('col_crn').value,
        time: document.getElementById('col_time').value,
        day: document.getElementById('col_day').value,
        rem: document.getElementById('col_rem').value
    };

    const btn = document.getElementById('processBtn'), pBox = document.getElementById('progressBox'), bar = document.getElementById('barFill'), txt = document.getElementById('statusText');
    btn.disabled = true; pBox.style.display = 'block';

    try {
        txt.innerText = "قراءة وتحليل البيانات...";
        const [mRaw, sRaw] = await Promise.all([readExcel(files.m), readExcel(files.s)]);

        // 1. بناء قاعدة بيانات الشعب (المرجع الثابت)
        let masterSections = {}; 
        let courseGroups = {};
        let sHeader = sRaw.find(r => r.includes(cols.course));
        let sIdx = sHeader.reduce((acc, c, i) => ({...acc, [String(c).trim()]: i}), {});

        sRaw.slice(sRaw.indexOf(sHeader)+1).forEach(row => {
            let code = row[sIdx[cols.course]], crn = row[sIdx[cols.crn]];
            if (!code || !crn) return;
            let days = []; for(let k in DAYS_MAP) if(String(row[sIdx[cols.day]]).includes(k)) days.push(DAYS_MAP[k]);
            let timeData = parseTimeRange(row[sIdx[cols.time]]);
            
            let sec = {
                crn, code, 
                type: row[sIdx['نوع الجدولة']] || 'نظري',
                rem: parseInt(row[sIdx[cols.rem]]) || 0,
                orig: parseInt(row[sIdx[cols.rem]]) || 0,
                mask: getMask(days, timeData),
                dayStr: row[sIdx[cols.day]],
                timeStr: row[sIdx[cols.time]]
            };
            masterSections[crn] = sec;
            if(!courseGroups[code]) courseGroups[code] = {};
            if(!courseGroups[code][sec.type]) courseGroups[code][sec.type] = [];
            courseGroups[code][sec.type].push(crn);
        });

        // 2. الكاش الذكي (ID-Based)
        txt.innerText = "توليد الـ Combinations (ID-Based)...";
        let comboCache = {};
        for (let code in courseGroups) {
            let types = Object.keys(courseGroups[code]);
            comboCache[code] = generateIDCombos(courseGroups[code], types, 0, masterSections);
        }

        // 3. تحليل المتدربين وترتيب MRV العالمي
        let mHeader = mRaw[0], mIdx = mHeader.reduce((acc, c, i) => ({...acc, [String(c).trim()]: i}), {});
        let courseStats = {};
        let trainees = mRaw.slice(1).map(row => {
            let req = [];
            mHeader.forEach((h, i) => {
                if (h !== cols.trainee && String(row[i]) === "1") {
                    req.push(h);
                    if (!courseStats[h]) courseStats[h] = { req:0, ok:0, fail:0, reasons:{} };
                }
            });
            return { id: row[mIdx[cols.trainee]], req };
        }).filter(t => t.id);

        // Heuristic: MRV + Degree
        const getCourseWeight = (c) => {
            if (!comboCache[c]) return 9999;
            let seats = 0; 
            for(let t in courseGroups[c]) seats += courseGroups[c][t].reduce((a,id)=>a+masterSections[id].rem, 0);
            return (1000/(seats+1)) + (500/(comboCache[c].length+1));
        };
        trainees.sort((a,b) => b.req.reduce((s,c)=>s+getCourseWeight(c),0) - a.req.reduce((s,c)=>s+getCourseWeight(c),0));

        // 4. حلقة المعالجة مع Forward Checking & DVO
        let results = [], rejections = [], global = { full:0, partial:0, none:0 };

        for (let i = 0; i < trainees.length; i++) {
            let t = trainees[i];
            let { schedule, trace } = solveCSP(t.req, comboCache, masterSections);
            
            let assignedCodes = schedule.map(combo => {
                combo.forEach(id => masterSections[id].rem--);
                return masterSections[combo[0]].code; 
            });

            t.req.forEach(code => {
                courseStats[code].req++;
                if (assignedCodes.includes(code)) {
                    courseStats[code].ok++;
                } else {
                    courseStats[code].fail++;
                    let reason = trace[code] || "تعارض غير معروف";
                    rejections.push({ id: t.id, code, reason });
                    courseStats[code].reasons[reason] = (courseStats[code].reasons[reason] || 0) + 1;
                }
            });

            if(assignedCodes.length === t.req.length) global.full++;
            else if(assignedCodes.length > 0) global.partial++;
            else global.none++;

            results.push({ id: t.id, crns: schedule.flat().join(', '), count: assignedCodes.length });

            if (i % 20 === 0) {
                bar.style.width = (i/trainees.length*100)+'%';
                txt.innerText = `جدولة المتدرب ${i} من ${trainees.length}...`;
                await new Promise(r => setTimeout(r, 0));
            }
        }

        const endTime = performance.now();
        txt.innerText = "توليد التقارير المتقدمة...";
        await exportV5Excel(results, rejections, courseStats, masterSections, global, trainees.length, (endTime-startTime)/1000);
        txt.innerText = "تم الانتهاء!"; bar.style.width = '100%';

    } catch (e) { console.error(e); txt.innerHTML = `<span style="color:red">خطأ: ${e.message}</span>`; }
    finally { btn.disabled = false; }
}

// توليد التركيبات المعتمد على الـ IDs
function generateIDCombos(groups, types, idx, master) {
    if (idx === types.length) return [[]];
    let res = [], next = generateIDCombos(groups, types, idx+1, master);
    for (let id of groups[types[idx]]) {
        let sec = master[id];
        for (let n of next) {
            let conflict = false;
            for (let nid of n) if (sec.mask.some((m,d) => (m & master[nid].mask[d]) !== 0n)) { conflict = true; break; }
            if (!conflict) res.push([id, ...n]);
        }
    }
    return res;
}

/**
 * المحرك الاستدلالي (CSP Solver)
 * يطبق: Forward Checking, Dynamic Variable Ordering (DVO)
 */
function solveCSP(requested, cache, master) {
    let bestSched = [], bestScore = -Infinity, trace = {};
    
    function solve(pending, currentMask, currentSched) {
        if (pending.length === 0) {
            let score = scoreSchedule(currentSched, master);
            if (currentSched.length > bestSched.length || (currentSched.length === bestSched.length && score > bestScore)) {
                bestSched = JSON.parse(JSON.stringify(currentSched));
                bestScore = score;
            }
            return;
        }

        // DVO: اختيار المادة "الأكثر تقييداً" (أقل عدد خيارات متاحة حالياً)
        pending.sort((a,b) => {
            let countA = (cache[a]||[]).filter(c => isPossible(c, currentMask, master)).length;
            let countB = (cache[b]||[]).filter(c => isPossible(c, currentMask, master)).length;
            return countA - countB;
        });

        let code = pending[0];
        let combos = (cache[code] || []).filter(c => isPossible(c, currentMask, master));

        if (combos.length === 0) {
            // توثيق سبب الفشل بدقة
            if (!cache[code]) trace[code] = "المقرر غير مطروح";
            else if (cache[code].every(c => c.some(id => master[id].rem <= 0))) trace[code] = "ممتلئ (لا توجد مقاعد)";
            else trace[code] = findDetailedConflict(code, cache, currentSched, master);
        }

        // خيار 1: تجربة كل Combo متاح للمادة (Forward Checking)
        for (let combo of combos) {
            let nextMask = [...currentMask];
            combo.forEach(id => master[id].mask.forEach((m,d) => nextMask[d] |= m));
            solve(pending.slice(1), nextMask, currentSched.concat([combo]));
        }

        // خيار 2: تجاوز المادة (Backtracking)
        solve(pending.slice(1), currentMask, currentSched);
    }

    solve(requested, Array(5).fill(0n), []);
    return { schedule: bestSched, trace };
}

function isPossible(combo, mask, master) {
    return combo.every(id => {
        let sec = master[id];
        if (sec.rem <= 0) return false;
        if (sec.mask.some((m,d) => (m & mask[d]) !== 0n)) return false;
        return true;
    });
}

function findDetailedConflict(code, cache, currentSched, master) {
    let combos = cache[code] || [];
    for (let combo of combos) {
        for (let id of combo) {
            for (let activeCombo of currentSched) {
                for (let activeId of activeCombo) {
                    let s1 = master[id], s2 = master[activeId];
                    for (let d=0; d<5; d++) {
                        if ((s1.mask[d] & s2.mask[d]) !== 0n) {
                            return `تعارض مع [${s2.code}] يوم ${s1.dayStr} الساعة ${s1.timeStr}`;
                        }
                    }
                }
            }
        }
    }
    return "تعارض زمني مع الجدول المختار";
}

function scoreSchedule(sched, master) {
    if (sched.length === 0) return -9999;
    let days = new Set(), gaps = 0, lastEnd = 0, earliestStart = 1440;
    let dayMap = {0:[],1:[],2:[],3:[],4:[]};

    sched.flat().forEach(id => {
        let s = master[id];
        s.mask.forEach((m, d) => { if(m > 0n) dayMap[d].push(s.timeData); });
    });

    for(let d in dayMap) {
        let evs = dayMap[d].sort((a,b)=>a.start-b.start);
        if(evs.length > 0) {
            days.add(d);
            if(evs[0].start < earliestStart) earliestStart = evs[0].start;
            if(evs[evs.length-1].end > lastEnd) lastEnd = evs[evs.length-1].end;
            for(let i=0; i<evs.length-1; i++) gaps += (evs[i+1].start - evs[i].end);
        }
    }
    // نقاط التقييم: مواد(+) ، أيام(-) ، فجوات(-) ، بداية مبكرة(+)
    return (sched.length * 2000) - (days.size * 500) - (gaps * 2) - (lastEnd * 0.5) + (earliestStart * 0.1);
}

async function readExcel(f) {
    const b = await f.arrayBuffer();
    const wb = XLSX.read(b);
    return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
}

async function exportV5Excel(res, rej, stats, master, global, total, time) {
    const wb = new ExcelJS.Workbook();
    
    // ورقة التوزيع
    const ws1 = wb.addWorksheet('توزيع المتدربين');
    ws1.columns = [{header:'رقم المتدرب', key:'id'}, {header:'الشعب', key:'crns', width:40}, {header:'المواد', key:'count'}];
    ws1.addRows(res);

    // ورقة أسباب التعارض (Detailed)
    const ws2 = wb.addWorksheet('تحليل التعارض الدقيق');
    ws2.columns = [{header:'الرقم', key:'id'}, {header:'المادة', key:'code'}, {header:'التفاصيل', key:'reason', width:50}];
    ws2.addRows(rej);

    // ورقة السعات (Utilization)
    const ws3 = wb.addWorksheet('استغلال المقاعد');
    ws3.addRow(['المقرر', 'الرقم المرجعي', 'النوع', 'السعة', 'المسجل', 'المتبقي', '% الاستغلال']);
    for(let id in master) {
        let s = master[id];
        let util = (((s.orig - s.rem)/s.orig)*100).toFixed(1) + '%';
        ws3.addRow([s.code, s.crn, s.type, s.orig, s.orig - s.rem, s.rem, util]);
    }

    // ورقة الإحصائيات (Executive)
    const ws4 = wb.addWorksheet('الملخص التنفيذي');
    ws4.addRows([
        ['المؤشر', 'القيمة'],
        ['زمن التنفيذ (ثانية)', time.toFixed(2)],
        ['إجمالي المتدربين', total],
        ['نجاح كامل', global.full],
        ['نجاح جزئي', global.partial],
        ['فشل كامل', global.none],
        ['متوسط المواد لكل متدرب', (res.reduce((a,b)=>a+b.count,0)/total).toFixed(2)]
    ]);

    wb.eachSheet(s => {
        s.getRow(1).font = { bold:true, color:{argb:'FFFFFFFF'} };
        s.getRow(1).fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FF008E7E'} };
        s.dir = 'rtl'; s.views = [{rightToLeft:true}];
    });

    const b = await wb.xlsx.writeBuffer();
    saveAs(new Blob([b]), `تقرير_V5_${Date.now()}.xlsx`);
}
</script>
</body>
</html>
