<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النظام الذكي لجدولة المتدربين - الإصدار Engine V4</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #008e7e; --secondary: #8dc63f; --bg: #f4f9f8; --danger: #dc3545; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }

        .btn-process:hover { background-color: #006d60; transform: translateY(-2px); }

        .status-text { text-align: center; font-size: 14px; margin-top: 8px; color: var(--primary); font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <h1>النظام الذكي لجدولة المتدربين</h1>
    <div class="version">الإصدار Engine V4 - المحرك الخبير (Cached & Pruned)</div>

    <details class="card">
        <summary style="cursor:pointer; font-weight:700; color:var(--primary)">⚙️ إعدادات أسماء الأعمدة</summary>
        <div class="settings-grid">
            <div><label>رقم المتدرب</label><input type="text" id="col_trainee_id" value="الرقم"></div>
            <div><label>رمز المقرر</label><input type="text" id="col_course" value="المقرر"></div>
            <div><label>الرقم المرجعي</label><input type="text" id="col_crn" value="الرقم المرجعي"></div>
            <div><label>نوع الجدولة</label><input type="text" id="col_type" value="نوع الجدولة"></div>
            <div><label>الوقت</label><input type="text" id="col_time" value="الوقت"></div>
            <div><label>اليوم</label><input type="text" id="col_day" value="اليوم"></div>
            <div><label>المتبقي</label><input type="text" id="col_rem" value="متبقي"></div>
        </div>
    </details>

    <div class="card">
        <label>1. مصفوفة طلبات التسجيل (.xlsx)</label>
        <input type="file" id="matrixFile" accept=".xlsx, .xls">
    </div>

    <div class="card">
        <label>2. تقرير جداول الشعب SS01 (.xlsx)</label>
        <input type="file" id="ss01File" accept=".xlsx, .xls">
    </div>

    <button class="btn-process" id="processBtn" onclick="runEngine()">بدء المعالجة الذكية</button>

    <div class="progress-box" id="progressBox">
        <div class="bar-container"><div class="bar-fill" id="barFill"></div></div>
        <div class="status-text" id="statusText">جاري التجهيز...</div>
    </div>
</div>

<script>
/** 
 * Engine V4 - المحرك الخبير
 * الخوارزميات: MRV (W-Sort), Pruned Branch & Bound, Combination Caching, Bitmasking.
 */

const DAYS_MAP = { 'الأحد':0, 'الاحد':0, 'الإثنين':1, 'الاثنين':1, 'الثلاثاء':2, 'الثلاثا':2, 'الأربعاء':3, 'الاربعاء':3, 'الخميس':4 };
const SLOT_SIZE = 30;

// --- أدوات الوقت والبتات ---
const parseTime = (tStr) => {
    if (!tStr) return null;
    let parts = String(tStr).split('-');
    if (parts.length < 2) return null;
    const toMin = (s) => {
        let m = s.match(/(\d+):(\d+)/);
        if (!m) return 0;
        let h = parseInt(m[1]), min = parseInt(m[2]);
        if (s.includes('م') && h < 12) h += 12;
        if (s.includes('ص') && h === 12) h = 0;
        return h * 60 + min;
    };
    return { start: toMin(parts[0]), end: toMin(parts[1]) };
};

const generateBitmask = (days, timeData) => {
    let masks = Array(5).fill(0n);
    if (!timeData || days.length === 0) return masks;
    let startSlot = Math.floor(timeData.start / SLOT_SIZE);
    let endSlot = Math.ceil(timeData.end / SLOT_SIZE);
    let durationMask = 0n;
    for (let i = startSlot; i < endSlot; i++) durationMask |= (1n << BigInt(i));
    days.forEach(d => { if (d >= 0 && d < 5) masks[d] = durationMask; });
    return masks;
};

async function runEngine() {
    const files = {
        matrix: document.getElementById('matrixFile').files[0],
        ss01: document.getElementById('ss01File').files[0]
    };
    if (!files.matrix || !files.ss01) return alert("يرجى اختيار الملفات المطلوبة");

    const cols = {
        trainee: document.getElementById('col_trainee_id').value.trim(),
        course: document.getElementById('col_course').value.trim(),
        crn: document.getElementById('col_crn').value.trim(),
        type: document.getElementById('col_type').value.trim(),
        time: document.getElementById('col_time').value.trim(),
        day: document.getElementById('col_day').value.trim(),
        rem: document.getElementById('col_rem').value.trim()
    };

    const btn = document.getElementById('processBtn'), pBox = document.getElementById('progressBox'), bar = document.getElementById('barFill'), txt = document.getElementById('statusText');
    btn.disabled = true; pBox.style.display = 'block';

    try {
        txt.innerText = "جاري قراءة الملفات...";
        const [matrixRaw, ss01Raw] = await Promise.all([readExcel(files.matrix), readExcel(files.ss01)]);

        // 1. بناء هيكل الشعب والسعات الأصلية
        txt.innerText = "بناء فهرس الشعب (SS01)...";
        let courseMap = {}, originalCapacities = {};
        let ss01Header = ss01Raw.find(r => r.includes(cols.course));
        let ss01Idx = ss01Header.reduce((acc, c, i) => ({...acc, [String(c).trim()]: i}), {});
        
        ss01Raw.slice(ss01Raw.indexOf(ss01Header) + 1).forEach(row => {
            let code = row[ss01Idx[cols.course]], crn = row[ss01Idx[cols.crn]];
            if (!code || !crn) return;
            
            let dayStr = String(row[ss01Idx[cols.day]]);
            let days = [];
            for (let k in DAYS_MAP) if (dayStr.includes(k)) days.push(DAYS_MAP[k]);

            let timeData = parseTime(row[ss01Idx[cols.time]]);
            let rem = parseInt(row[ss01Idx[cols.rem]]) || 0;
            let section = { 
                code, crn, type: row[ss01Idx[cols.type]] || 'نظري', 
                remaining: rem, original: rem, 
                mask: generateBitmask(days, timeData), 
                days, timeData 
            };

            if (!courseMap[code]) courseMap[code] = {};
            if (!courseMap[code][section.type]) courseMap[code][section.type] = [];
            courseMap[code][section.type].push(section);
            originalCapacities[crn] = rem;
        });

        // 2. إنشاء الـ Cache للتركيبات (الدمج بين نظري وعملي لنفس المقرر)
        txt.innerText = "توليد Cache التركيبات الممكنة لكل مقرر...";
        let comboCache = {};
        for (let code in courseMap) {
            let types = Object.keys(courseMap[code]);
            comboCache[code] = generateAllInternalCombos(courseMap[code], types, 0);
        }

        // 3. تحليل المتدربين (MRV)
        txt.innerText = "تحليل طلبات المتدربين وتطبيق MRV...";
        let mHeader = matrixRaw[0], mIdx = mHeader.reduce((acc, c, i) => ({...acc, [String(c).trim()]: i}), {});
        let courseStats = {};

        let trainees = matrixRaw.slice(1).map(row => {
            let req = [];
            mHeader.forEach((h, i) => {
                if (h !== cols.trainee && String(row[i]) === "1") {
                    req.push(h);
                    if (!courseStats[h]) courseStats[h] = { requested:0, assigned:0, failed:0, reasons:{} };
                }
            });
            return { id: row[mIdx[cols.trainee]], requested: req };
        }).filter(t => t.id);

        // حساب صعوبة المقرر (Heuristic)
        const getDifficulty = (c) => {
            if (!comboCache[c] || comboCache[c].length === 0) return 9999;
            let totalSeats = 0;
            for(let type in courseMap[c]) totalSeats += courseMap[c][type].reduce((a,b)=>a+b.remaining, 0);
            return (1 / (totalSeats + 1)) * (1 / comboCache[c].length);
        };

        // ترتيب المتدربين (الأصعب أولاً)
        trainees.sort((a,b) => b.requested.reduce((s,c)=>s+getDifficulty(c),0) - a.requested.reduce((s,c)=>s+getDifficulty(c),0));

        // 4. محرك المعالجة الرئيسي
        let results = [], rejectionLog = [], globalStats = { full: 0, partial: 0, failed: 0 };

        for (let i = 0; i < trainees.length; i++) {
            let t = trainees[i];
            // ترتيب المقررات داخل طلب المتدرب (MRV: الأندر أولاً)
            t.requested.sort((a,b) => getDifficulty(b) - getDifficulty(a));

            let bestSchedule = findBestSchedulePruned(t.requested, comboCache);
            
            let assignedCodes = bestSchedule.map(s => s.code);
            let assignedCrns = [];

            bestSchedule.forEach(sec => {
                assignedCrns.push(sec.crn);
                sec.remaining--; // الخصم الحقيقي بعد اختيار الجدول النهائي للمتدرب
            });

            t.requested.forEach(code => {
                courseStats[code].requested++;
                if (assignedCodes.includes(code)) {
                    courseStats[code].assigned++;
                } else {
                    courseStats[code].failed++;
                    let reason = getReason(code, comboCache, bestSchedule);
                    rejectionLog.push({ id: t.id, code, reason });
                    courseStats[code].reasons[reason] = (courseStats[code].reasons[reason] || 0) + 1;
                }
            });

            if (assignedCodes.length === t.requested.length) globalStats.full++;
            else if (assignedCodes.length > 0) globalStats.partial++;
            else globalStats.failed++;

            results.push({ id: t.id, crns: assignedCrns.join(', '), count: assignedCodes.length });

            if (i % 25 === 0) {
                bar.style.width = (i / trainees.length * 100) + '%';
                txt.innerText = `جدولة المتدرب ${i} من ${trainees.length}...`;
                await new Promise(r => setTimeout(r, 0));
            }
        }

        // 5. التصدير
        txt.innerText = "توليد التقارير النهائية...";
        await exportFullExcel(results, rejectionLog, courseStats, courseMap, globalStats, trainees.length);
        txt.innerText = "تمت المعالجة بنجاح!";
        bar.style.width = '100%';

    } catch (err) {
        console.error(err);
        txt.innerHTML = `<span style="color:red">خطأ: ${err.message}</span>`;
    } finally { btn.disabled = false; }
}

// توليد كافة التركيبات الممكنة (نظري + عملي) لمقرر واحد مرة واحدة فقط
function generateAllInternalCombos(typesMap, types, tIdx) {
    if (tIdx === types.length) return [[]];
    let results = [];
    let currentType = types[tIdx];
    let nextCombos = generateAllInternalCombos(typesMap, types, tIdx + 1);

    for (let sec of typesMap[currentType]) {
        for (let next of nextCombos) {
            // فحص التعارض الداخلي (مثلاً النظري مع العملي لنفس المادة)
            let conflict = false;
            if (next.length > 0) {
                for (let nSec of next) {
                    if (sec.mask.some((m, d) => (m & nSec.mask[d]) !== 0n)) { conflict = true; break; }
                }
            }
            if (!conflict) results.push([sec, ...next]);
        }
    }
    return results;
}

// محرك البحث مع التقليم (Pruning)
function findBestSchedulePruned(requested, comboCache) {
    let best = [];
    let bestScore = -Infinity;

    function solve(idx, currentSched, currentMask) {
        // Pruning: إذا كان الباقي + الحالي لا يمكن أن يتجاوز الأفضل المكتشف
        if (currentSched.length + (requested.length - idx) < best.length) return;

        if (idx === requested.length) {
            let score = calculateExpertScore(currentSched);
            if (currentSched.length > best.length || (currentSched.length === best.length && score > bestScore)) {
                best = [...currentSched];
                bestScore = score;
            }
            return;
        }

        let code = requested[idx];
        let combos = comboCache[code] || [];

        // خيار 1: محاولة إضافة المادة
        for (let combo of combos) {
            // فحص السعة والتعارض (باستخدام القناع الممرر)
            if (combo.every(s => s.remaining > 0)) {
                let conflict = false;
                for (let s of combo) {
                    if (s.mask.some((m, d) => (m & currentMask[d]) !== 0n)) { conflict = true; break; }
                }
                if (!conflict) {
                    let nextMask = [...currentMask];
                    combo.forEach(s => s.mask.forEach((m, d) => nextMask[d] |= m));
                    solve(idx + 1, currentSched.concat(combo), nextMask);
                }
            }
        }
        // خيار 2: تجاوز المادة (Branch & Bound)
        solve(idx + 1, currentSched, currentMask);
    }

    solve(0, [], Array(5).fill(0n));
    // تحويل التركيبة المختارة لشكل مسطح من الشعب
    return best;
}

function calculateExpertScore(sched) {
    if (sched.length === 0) return -9999;
    let days = new Set(), totalGap = 0, latestEnd = 0, dayEvents = {0:[],1:[],2:[],3:[],4:[]};
    
    sched.forEach(s => {
        s.days.forEach(d => {
            days.add(d);
            dayEvents[d].push(s.timeData);
            if(s.timeData.end > latestEnd) latestEnd = s.timeData.end;
        });
    });

    for (let d in dayEvents) {
        let evs = dayEvents[d].sort((a,b) => a.start - b.start);
        for(let i=0; i<evs.length-1; i++) totalGap += (evs[i+1].start - evs[i].end);
    }
    // نقاط القوة: (مواد * 1000) - (أيام * 100) - (فجوات * 0.5) - (تأخير * 0.1)
    return (sched.length * 1000) - (days.size * 100) - (totalGap * 0.5) - (latestEnd * 0.1);
}

function getReason(code, comboCache, assignedSched) {
    if (!comboCache[code] || comboCache[code].length === 0) return "غير مطروح في SS01";
    let combos = comboCache[code];
    if (combos.every(c => c.some(s => s.remaining <= 0))) return "لا توجد مقاعد شاغرة (ممتلئ)";
    return "تعارض زمني مع الجدول المختار";
}

async function readExcel(file) {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf);
    return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
}

async function exportFullExcel(results, rejection, courseStats, courseMap, global, totalT) {
    const wb = new ExcelJS.Workbook();
    
    // 1. جدول المتدربين
    const ws1 = wb.addWorksheet('توزيع المتدربين');
    ws1.columns = [{header:'رقم المتدرب', key:'id', width:15}, {header:'الأرقام المرجعية المسجلة', key:'crns', width:40}, {header:'عدد المواد', key:'count', width:12}];
    ws1.addRows(results);

    // 2. تحليل الرفض
    const ws2 = wb.addWorksheet('تحليل الرفض والتعارض');
    ws2.columns = [{header:'رقم المتدرب', key:'id', width:15}, {header:'المقرر', key:'code', width:15}, {header:'سبب عدم التسجيل', key:'reason', width:35}];
    ws2.addRows(rejection);

    // 3. تقرير السعات (الأصلية والمتبقية)
    const ws3 = wb.addWorksheet('تقرير السعات والشعب');
    ws3.addRow(['المقرر', 'الرقم المرجعي', 'النوع', 'السعة الأصلية', 'المسجلين', 'المتبقي', 'الحالة']);
    for(let code in courseMap) {
        for(let type in courseMap[code]) {
            courseMap[code][type].forEach(s => {
                let status = s.remaining <= 0 ? 'ممتلئة' : 'شاغرة';
                ws3.addRow([code, s.crn, type, s.original, s.original - s.remaining, s.remaining, status]);
            });
        }
    }

    // 4. إحصائيات المقررات
    const ws4 = wb.addWorksheet('إحصائيات المقررات');
    ws4.addRow(['رمز المقرر', 'إجمالي الطلبات', 'تم التسجيل', 'لم يسجل', 'السبب الأكثر شيوعاً']);
    for(let code in courseStats) {
        let s = courseStats[code];
        let topReason = Object.keys(s.reasons).reduce((a, b) => s.reasons[a] > s.reasons[b] ? a : b, 'لا يوجد');
        ws4.addRow([code, s.requested, s.assigned, s.failed, topReason]);
    }

    // 5. الإحصاء العام
    const ws5 = wb.addWorksheet('الملخص العام');
    ws5.addRows([
        ['البيان', 'العدد', 'النسبة'],
        ['إجمالي المتدرب
