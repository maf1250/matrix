<script>
    const WEIGHT_DAYS = 5000;
    const WEIGHT_GAPS = 50;
    const WEIGHT_REM = 20;

    const daysMap = { 'الأحد':0, 'الاحد':0, 'الإثنين':1, 'الاثنين':1, 'الثلاثاء':2, 'الأربعاء':3, 'الاربعاء':3, 'الخميس':4, 'الجمعة':5, 'السبت':6 };
    const reverseDaysMap = { 0: 'الأحد', 1: 'الإثنين', 2: 'الثلاثاء', 3: 'الأربعاء', 4: 'الخميس', 5: 'الجمعة', 6: 'السبت' };

    function parseDays(dayStr) {
        if (!dayStr) return [];
        let str = String(dayStr).replace(/\s/g, '');
        let days = [];
        for (let key in daysMap) { if (str.includes(key)) days.push(daysMap[key]); }
        return days;
    }

function parseTimeRange(timeStr) {
    if (!timeStr) return null;

    let parts = String(timeStr)
        .replace(/[–—−]/g, "-")
        .split(/\s*[-–—−]\s*/)
        .map(x => x.trim());

    if (parts.length !== 2) return null;

    function toMinutes(t) {
        t = String(t).trim();
        let hrs, mins;

        if (/^\d{1,2}:\d{2}$/.test(t)) {
            let p = t.split(":");
            hrs = parseInt(p[0], 10);
            mins = parseInt(p[1], 10);
        }
        else if (/^\d{4}$/.test(t)) {
            hrs = parseInt(t.substring(0,2),10);
            mins = parseInt(t.substring(2,4),10);
        }
        else if (/^\d{3}$/.test(t)) {
            hrs = parseInt(t.substring(0,1),10);
            mins = parseInt(t.substring(1,3),10);
        }
        else {
            return null;
        }

        if (t.includes("م") && hrs < 12) hrs += 12;
        if (t.includes("ص") && hrs === 12) hrs = 0;

        return hrs * 60 + mins;
    }

    let t1 = toMinutes(parts[0]);
    let t2 = toMinutes(parts[1]);

    if (t1 == null || t2 == null) return null;

    let start = Math.min(t1, t2);
    let end   = Math.max(t1, t2);

    return { start, end };
}

    function formatTime(mins) {
        let h = Math.floor(mins / 60);
        let m = mins % 60;
        let ampm = h >= 12 ? 'م' : 'ص';
        let displayH = h % 12;
        if (displayH === 0) displayH = 12;
        return `${displayH}:${m.toString().padStart(2, '0')} ${ampm}`;
    }

    function getConflictDetail(sec1, sec2) {
        if (!sec1.schedules || !sec2.schedules) return null;
        
        for (let sched1 of sec1.schedules) {
            for (let sched2 of sec2.schedules) {
                let overlapDays = sched1.days.filter(d => sched2.days.includes(d));
                if (overlapDays.length > 0) {
                    if (sched1.timeData.start < sched2.timeData.end && sched2.timeData.start < sched1.timeData.end) {
                        let dayName = reverseDaysMap[overlapDays[0]];
                        return `تعارض مع مقرر (${sec2.code}) يوم ${dayName} من ${formatTime(sched2.timeData.start)} إلى ${formatTime(sched2.timeData.end)}`;
                    }
                }
            }
        }
        return null;
    }

    function getCombinations(optionsPerType, linkedCRNs = {}, crnToType = {}) {
        let keys = Object.keys(optionsPerType);
        if (keys.length === 0) return [];
        let results = [];
        function helper(idx, currentCombo) {
            if (idx === keys.length) {
                results.push([...currentCombo]);
                return;
            }
            let type = keys[idx];
            for (let sec of optionsPerType[type]) {
                let hasConflictInside = currentCombo.some(c => getConflictDetail(c, sec) !== null);
                if (hasConflictInside) continue;

                let isLinkValid = true;
                let crn2 = String(sec.crn);
                
                for (let existSec of currentCombo) {
                    let crn1 = String(existSec.crn);
                    
                    let crn1HasLinksOfCrn2Type = false;
                    if (linkedCRNs[crn1]) {
                        for (let linkedCrn of linkedCRNs[crn1]) {
                            if (crnToType[linkedCrn] === sec.type) {
                                crn1HasLinksOfCrn2Type = true;
                                break;
                            }
                        }
                    }

                    let crn2HasLinksOfCrn1Type = false;
                    if (linkedCRNs[crn2]) {
                        for (let linkedCrn of linkedCRNs[crn2]) {
                            if (crnToType[linkedCrn] === existSec.type) {
                                crn2HasLinksOfCrn1Type = true;
                                break;
                            }
                        }
                    }

                    if (crn1HasLinksOfCrn2Type && !linkedCRNs[crn1].has(crn2)) {
                        isLinkValid = false; break;
                    }
                    if (crn2HasLinksOfCrn1Type && !linkedCRNs[crn2].has(crn1)) {
                        isLinkValid = false; break;
                    }
                }

                if (isLinkValid) {
                    currentCombo.push(sec);
                    helper(idx + 1, currentCombo);
                    currentCombo.pop();
                }
            }
        }
        helper(0, []);
        return results;
    }

    function scoreSchedule(schedule) {
        let daysUsed = new Set();
        let dailyClasses = {};
        let minRemaining = Infinity;

        for (let sec of schedule) {
            if (sec.remaining < minRemaining) minRemaining = sec.remaining;
            for (let sched of sec.schedules) {
                for (let d of sched.days) {
                    daysUsed.add(d);
                    if (!dailyClasses[d]) dailyClasses[d] = [];
                    dailyClasses[d].push(sched.timeData);
                }
            }
        }

        let totalGaps = 0;
        let maxEndTime = 0;

        for (let d in dailyClasses) {
            let times = dailyClasses[d];
            times.sort((a, b) => a.start - b.start);
            for (let i = 0; i < times.length - 1; i++) {
                let gap = times[i+1].start - times[i].end;
                if (gap > 0) totalGaps += gap; 
            }
            let lastEnd = times[times.length - 1].end;
            if (lastEnd > maxEndTime) maxEndTime = lastEnd; 
        }
        let score = (daysUsed.size * WEIGHT_DAYS) + (totalGaps * WEIGHT_GAPS) + maxEndTime - (minRemaining * WEIGHT_REM);
        return score;
    }

    function readMatrixFile(file, idHeader, nameHeader, courseHeaderTitle) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: "array" });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonArray = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });

                    let idRowIndex = -1, idColIndex = -1, nameColIndex = -1;

                    for (let r = 0; r < jsonArray.length; r++) {
                        for (let c = 0; c < jsonArray[r].length; c++) {
                            let value = String(jsonArray[r][c]).trim();
                            if (value === idHeader) { idRowIndex = r; idColIndex = c; }
                            if (value === nameHeader) { nameColIndex = c; }
                        }
                        if (idColIndex !== -1 && nameColIndex !== -1) break;
                    }

                    if (idRowIndex === -1 || idColIndex === -1) return reject(new Error("لم يتم العثور على عمود رقم المتدرب"));
                    if (nameColIndex === -1) return reject(new Error("لم يتم العثور على عمود اسم المتدرب"));

                    let courseHeaderRow = -1, courseStartCol = -1;
                    for (let r = 0; r < jsonArray.length; r++) {
                        let row = jsonArray[r];
                        for (let c = 0; c < row.length; c++) {
                            if (String(row[c]).trim() !== courseHeaderTitle) continue;
                            let count = 0;
                            for (let i = c + 1; i < row.length; i++) { if (String(row[i]).trim() !== "") count++; }
                            if (count >= 5) { courseHeaderRow = r; courseStartCol = c + 1; break; }
                        }
                        if (courseHeaderRow !== -1) break;
                    }

                    if (courseHeaderRow === -1) return reject(new Error("لم يتم العثور على صف رموز المقررات"));

                    let courseHeaders = [];
                    courseHeaders[idColIndex] = idHeader;
                    courseHeaders[nameColIndex] = nameHeader;
                    for (let c = courseStartCol; c < jsonArray[courseHeaderRow].length; c++) {
                        courseHeaders[c] = String(jsonArray[courseHeaderRow][c]).trim();
                    }

                    const dataRows = [];
                    for (let r = idRowIndex + 1; r < jsonArray.length; r++) {
                        let traineeId = String(jsonArray[r][idColIndex]).trim();
                        if (traineeId === "") continue;

                        let rowObj = {};
                        rowObj[idHeader] = traineeId;
                        rowObj[nameHeader] = String(jsonArray[r][nameColIndex]).trim();
                        let hasRequests = false;

                        for (let c = courseStartCol; c < courseHeaders.length; c++) {
                            if (courseHeaders[c] && String(jsonArray[r][c]).trim() === "1") {
                                rowObj[courseHeaders[c]] = "1";
                                hasRequests = true;
                            }
                        }
                        if (hasRequests) dataRows.push(rowObj);
                    }
                    resolve(dataRows);
                } catch (err) { reject(err); }
            };
            reader.onerror = () => reject(new Error("خطأ بقراءة ملف المصفوفة"));
            reader.readAsArrayBuffer(file);
        });
    }      

    function readSS01File(file, expectedHeader) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonArray = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                    
                    let headerRowIndex = -1;
                    for (let i = 0; i < jsonArray.length; i++) {
                        let rowStrings = jsonArray[i].map(c => String(c).trim());
                        if (rowStrings.includes(expectedHeader)) { headerRowIndex = i; break; }
                    }
                    if (headerRowIndex === -1) { reject(new Error(`لم يتم العثور على عمود '${expectedHeader}' في تقرير SS01`)); return; }

                    const headers = jsonArray[headerRowIndex].map(c => String(c).trim());
                    const dataRows = [];
                    for (let i = headerRowIndex + 1; i < jsonArray.length; i++) {
                        let rowObj = {}, hasData = false;
                        for (let j = 0; j < headers.length; j++) {
                            if (headers[j]) { rowObj[headers[j]] = jsonArray[i][j]; if (jsonArray[i][j] !== "") hasData = true; }
                        }
                        if (hasData) dataRows.push(rowObj);
                    }
                    resolve(dataRows);
                } catch (err) { reject(err); }
            };
            reader.onerror = () => reject(new Error("خطأ بقراءة تقرير SS01"));
            reader.readAsArrayBuffer(file);
        });
    }

    function readSF33File(file, crn1Header, crn2Header) {
        if (!file) return Promise.resolve([]);
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonArray = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });

                    let headerRowIndex = -1;
                    for (let i = 0; i < jsonArray.length; i++) {
                        let rowStrings = jsonArray[i].map(c => String(c).trim());
                        if (rowStrings.includes(crn1Header) && rowStrings.includes(crn2Header)) {
                            headerRowIndex = i; break;
                        }
                    }
                    if (headerRowIndex === -1) {
                        resolve([]); 
                        return;
                    }

                    const headers = jsonArray[headerRowIndex].map(c => String(c).trim());
                    const links = [];
                    for (let i = headerRowIndex + 1; i < jsonArray.length; i++) {
                        let rowObj = {};
                        for (let j = 0; j < headers.length; j++) {
                            if (headers[j]) rowObj[headers[j]] = jsonArray[i][j];
                        }
                        if (rowObj[crn1Header] && rowObj[crn2Header]) {
                            links.push({
                                crn1: String(rowObj[crn1Header]).trim(),
                                crn2: String(rowObj[crn2Header]).trim()
                            });
                        }
                    }
                    resolve(links);
                } catch (err) { reject(err); }
            };
            reader.onerror = () => reject(new Error("خطأ بقراءة تقرير SF33"));
            reader.readAsArrayBuffer(file);
        });
    }

async function exportToExcel(sheetsData, filename) {
    const workbook = new ExcelJS.Workbook();
    
    for (let sheetInfo of sheetsData) {
        const worksheet = workbook.addWorksheet(sheetInfo.name, {
            views: [{ rightToLeft: true, state: 'frozen', xSplit: 0, ySplit: 1 }]
        });
        
        if (!sheetInfo.data || sheetInfo.data.length === 0) continue;
        
        let allKeys = new Set();
        sheetInfo.data.forEach(row => {
            Object.keys(row).forEach(key => allKeys.add(key));
        });
        const headers = Array.from(allKeys);
        worksheet.columns = headers.map(header => ({ header: header, key: header }));     
        worksheet.addRows(sheetInfo.data);
        worksheet.autoFilter = { from: { row: 1, column: 1 }, to: { row: 1, column: headers.length } };
        
        worksheet.eachRow((row, rowNumber) => {
            row.eachCell({ includeEmpty: false }, (cell) => {
                cell.alignment = {
                    vertical: 'middle',
                    horizontal: 'center',
                    wrapText: true
                };
                
                cell.border = {
                    top: { style: 'thin', color: { argb: 'FFD6E3E1' } },
                    left: { style: 'thin', color: { argb: 'FFD6E3E1' } },
                    bottom: { style: 'thin', color: { argb: 'FFD6E3E1' } },
                    right: { style: 'thin', color: { argb: 'FFD6E3E1' } }
                };

                if (rowNumber === 1) {
                    cell.font = { bold: true, color: { argb: 'FFFFFFFF' } };
                    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF008E7E' } };
                } else {
                    cell.fill = {
                        type: 'pattern',
                        pattern: 'solid',
                        fgColor: {
                            argb: rowNumber % 2 === 0 ? 'FFF2F8F7' : 'FFFFFFFF'
                        }
                    };
                }
            });
        });

        worksheet.columns.forEach(column => {
            let maxLength = 0;
            
            column.eachCell({ includeEmpty: true }, cell => {
                if (cell.value) {
                    let text = cell.value.toString();
                    let lines = text.split('\n');
                    lines.forEach(line => {
                        let length = line.length;
                        if (length > maxLength) {
                            maxLength = length;
                        }
                    });
                }
            });
            
            column.width = maxLength < 12 ? 12 : maxLength + 4;
        });
    } 

    const buffer = await workbook.xlsx.writeBuffer();
    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    saveAs(blob, filename);
}
    
    async function startProcessing() {
        const traineesFile = document.getElementById('traineesFile').files[0];
        const ss01File = document.getElementById('ss01File').files[0];
        const sf33File = document.getElementById('sf33File').files[0];
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('processBtn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');

        if (!traineesFile || !ss01File) {
            statusDiv.innerHTML = '<span class="error">نأمل إرفاق الملفات أولاً!</span>'; return;
        }

        const C_TRAINEE_NAME = document.getElementById('col_trainee_name').value.trim();
        const C_TRAINEE_ID = document.getElementById('col_trainee_id').value.trim();
        const C_COURSE_HEADER = document.getElementById('col_course_header').value.trim();
        const C_COURSE = document.getElementById('col_course').value.trim();
        const C_CRN = document.getElementById('col_crn').value.trim();
        const C_TYPE = document.getElementById('col_type').value.trim();
        const C_TIME = document.getElementById('col_time').value.trim();
        const C_DAY = document.getElementById('col_day').value.trim();
        const C_REM = document.getElementById('col_rem').value.trim();
        const C_SF33_CRN1 = document.getElementById('col_sf33_crn1').value.trim();
        const C_SF33_CRN2 = document.getElementById('col_sf33_crn2').value.trim();

        btn.disabled = true;
        loader.style.display = 'inline-block';
        btnText.innerText = 'جار التهيئة...';
        statusDiv.innerHTML = '';

        try {
            let [traineesRaw, ss01Raw, sf33Raw] = await Promise.all([
                readMatrixFile(traineesFile, C_TRAINEE_ID, C_TRAINEE_NAME, C_COURSE_HEADER), 
                readSS01File(ss01File, C_COURSE),
                readSF33File(sf33File, C_SF33_CRN1, C_SF33_CRN2)
            ]);

            if (ss01Raw.length > 0) {
                let firstRow = ss01Raw[0];
                let missingCols = [];
                if (!(C_CRN in firstRow)) missingCols.push(C_CRN);
                if (!(C_TIME in firstRow)) missingCols.push(C_TIME);
                if (!(C_DAY in firstRow)) missingCols.push(C_DAY);
                if (!(C_REM in firstRow)) missingCols.push(C_REM);
                
                if (missingCols.length > 0) {
                    throw new Error(`الأعمدة التالية مفقودة أو مسماة بشكل خاطئ في تقرير SS01: ${missingCols.join(' ، ')}`);
                }
            }
            
            let courseMap = {};
            let allSectionsRef = {};
            let courseTotalCapacity = {};
            let courseOriginalCapacity = {}; 
            let courseStats = {}; 
            let crnToType = {};

            ss01Raw.forEach(row => {
                let code = row[C_COURSE];
                let crn = String(row[C_CRN]).trim();
                
                let type = row[C_TYPE] ? String(row[C_TYPE]).trim() : '';
                if (!type && row['نوع الشعبة']) { type = String(row['نوع الشعبة']).trim(); }
                if (!type) { type = 'نظري'; }

                let rem = parseInt(row[C_REM]) || 0;
                if (!code || !crn) return;

                crnToType[crn] = type;

                let days = parseDays(row[C_DAY]);
                let timeData = parseTimeRange(row[C_TIME]);

                if (days.length === 0 || !timeData) return; 

                if (allSectionsRef[crn]) {
                    allSectionsRef[crn].schedules.push({ days: days, timeData: timeData });
                } else {
                    let section = {
                        code: code, crn: crn, type: type, remaining: rem, originalRem: rem,
                        schedules: [{ days: days, timeData: timeData }]
                    };
                    allSectionsRef[crn] = section;
                    if (!courseMap[code]) courseMap[code] = {};
                    if (!courseMap[code][type]) courseMap[code][type] = [];
                    courseMap[code][type].push(section);
                }

                if (!courseStats[code]) { courseStats[code] = { requested: 0, registered: 0, unregistered: 0, reasons: {} }; }
            });

            let linkedCRNs = {};
            sf33Raw.forEach(link => {
                let c1 = link.crn1;
                let c2 = link.crn2;
                if (!linkedCRNs[c1]) linkedCRNs[c1] = new Set();
                if (!linkedCRNs[c2]) linkedCRNs[c2] = new Set();
                linkedCRNs[c1].add(c2);
                linkedCRNs[c2].add(c1);
            });

            for (let code in courseMap) {
                let minCap = -1;
                for (let type in courseMap[code]) {
                    let typeTotal = courseMap[code][type].reduce((sum, sec) => sum + sec.remaining, 0);
                    if (minCap === -1 || typeTotal < minCap) minCap = typeTotal;
                }
                courseTotalCapacity[code] = minCap;
                courseOriginalCapacity[code] = minCap;
            }

            let structuredTrainees = traineesRaw.map(tRow => {
                let req = [];
                let rarityScore = 0; 
                for (let key in tRow) { 
                    if (key !== C_TRAINEE_ID && tRow[key] === "1") {
                        req.push(key);
                        rarityScore += (1 / (courseTotalCapacity[key] || 1));
                    }
                }
                return {
                    id: tRow[C_TRAINEE_ID],
                    name: tRow[C_TRAINEE_NAME] || "",
                    requiredCourses: req,
                    mrvScore: rarityScore
                };
            });

            structuredTrainees.sort((a, b) => {
                let scoreA = (a.requiredCourses.length * 10) + a.mrvScore;
                let scoreB = (b.requiredCourses.length * 10) + b.mrvScore;
                return scoreB - scoreA; 
            });

            let mainSheetData = [];
            let assignedCodesData = [];
            let unassignedCodesData = [];
            let unregisteredData = [];
            let notAssignedData = [];
            let stats = { total: 0, fullSuccess: 0, partialSuccess: 0, failed: 0 };

            for (let i = 0; i < structuredTrainees.length; i++) {
                let trainee = structuredTrainees[i];
                let finalSchedule = [];
                let finalCodes = [];
                let studentCrns = [];

                if (i % 10 === 0) {
                    await new Promise(resolve => setTimeout(resolve, 0));
                    let percent = Math.round((i / structuredTrainees.length) * 100);
                    btnText.innerText = `جار المعالجة: ${percent}% (${i}/${structuredTrainees.length})`;
                }

                let traineeId = trainee.id;
                let traineeName = trainee.name;
                let requiredCourses = trainee.requiredCourses;
                stats.total++;

                requiredCourses.sort((c1, c2) => (courseTotalCapacity[c1] || 0) - (courseTotalCapacity[c2] || 0));

                let courseOptions = [];
                
                // بناء الخيارات المتاحة لكل مقرر للمتدرب
                requiredCourses.forEach(code => {
                    if (!courseStats[code]) {
                        courseStats[code] = { requested: 0, registered: 0, unregistered: 0, reasons: {} };
                    }
                    courseStats[code].requested++;
                    
                    if (courseMap[code]) {
                        let validOptions = {};
                        for (let type in courseMap[code]) {
                            validOptions[type] = courseMap[code][type].filter(s => s.remaining > 0);
                        }
                        let combos = getCombinations(validOptions, linkedCRNs, crnToType);
                        if (combos.length > 0) {
                            courseOptions.push({ code: code, combos: combos });
                        }
                    }
                });

                // ترتيب الخيارات من الأقل مرونة للأكثر مرونة لتسريع خوارزمية التراجع بشكل هائل
                courseOptions.sort((a, b) => a.combos.length - b.combos.length);

                let bestSchedules = [];
                let maxCourses = 0;
                let iterations = 0;
                const MAX_ITERATIONS = 500000;

                function findBestSchedule(cIndex, currentSched, currentCodes) {
                    if (iterations >= MAX_ITERATIONS) return; 
                    iterations++;
                    let remainingCourses = courseOptions.length - cIndex;

                    if (currentCodes.length + remainingCourses < maxCourses) return;

                    if (cIndex === courseOptions.length) {
                        if (currentCodes.length > maxCourses) {
                            maxCourses = currentCodes.length;
                            bestSchedules = [ [...currentSched] ];
                        } else if (currentCodes.length === maxCourses && bestSchedules.length < 20) {
                            bestSchedules.push([...currentSched]);
                        }
                        return;
                    }
                    
                    let cOpt = courseOptions[cIndex];
                    cOpt.combos.sort((a, b) => {
                        let remA = Math.min(...a.map(s => s.remaining));
                        let remB = Math.min(...b.map(s => s.remaining));
                        return remB - remA;
                    });
                    
                    for (let combo of cOpt.combos) {
                        let hasConflict = false;
                        for (let sec of combo) {
                            for (let existSec of currentSched) {
                                if (getConflictDetail(sec, existSec) !== null) { hasConflict = true; break; }
                            }
                            if(hasConflict) break;
                        }
                        if (!hasConflict) {
                            findBestSchedule(cIndex + 1, currentSched.concat(combo), currentCodes.concat([cOpt.code]));
                        }
                    }
                    findBestSchedule(cIndex + 1, currentSched, currentCodes);
                }

                findBestSchedule(0, [], []);

                if (bestSchedules.length > 0) {
                    bestSchedules.sort((a, b) => scoreSchedule(a) - scoreSchedule(b));
                    finalSchedule = bestSchedules[0];
                    finalCodes = [...new Set(finalSchedule.map(s => s.code))];
                }

                finalSchedule.forEach(sec => {
                    sec.remaining -= 1; 
                    studentCrns.push(sec.crn);
                });
                
                finalCodes.forEach(code => {
                    courseTotalCapacity[code] -= 1;
                    courseStats[code].registered++;
                });

                if (finalCodes.length > 0 && i < structuredTrainees.length - 1) {
                    let remainingTrainees = structuredTrainees.slice(i + 1);
                    remainingTrainees.forEach(t => {
                        let newRarityScore = 0;
                        t.requiredCourses.forEach(key => {
                            let cap = courseTotalCapacity[key] > 0 ? courseTotalCapacity[key] : 0.01;
                            newRarityScore += (1 / cap);
                        });
                        t.mrvScore = newRarityScore;
                    });

                    remainingTrainees.sort((a, b) => {
                        let scoreA = (a.requiredCourses.length * 10) + a.mrvScore;
                        let scoreB = (b.requiredCourses.length * 10) + b.mrvScore;
                        return scoreB - scoreA;
                    });

                    structuredTrainees.splice(i + 1, remainingTrainees.length, ...remainingTrainees);
                }
                
                // تسجيل المقررات المتبقية وأسباب عدم الإسناد
                let unassignedRow = {
                    [C_TRAINEE_NAME]: traineeName,
                    [C_TRAINEE_ID]: traineeId
                };
                let missingCount = 0;

                requiredCourses.forEach(code => {
                    if (!finalCodes.includes(code)) {
                        courseStats[code].unregistered++;
                        let reason = "";
                        
                        if (!courseMap[code]) {
                            reason = "غير مطروح في تقرير جداول الوحدة التدريبية";
                        } else {
                            let availableTypes = courseMap[code];
                            let typesCount = Object.keys(availableTypes).length;
                            let validOptions = {};
                            let emptyTypes = [];
                            
                            for (let type in availableTypes) {
                                let availableSections = availableTypes[type].filter(s => s.remaining > 0);
                                validOptions[type] = availableSections;
                                if (availableSections.length === 0) {
                                    emptyTypes.push(type);
                                }
                            }
                            
                            if (emptyTypes.length === typesCount) {
                                reason = "لا توجد مقاعد شاغرة (ممتلئ تماماً)";
                            } else if (emptyTypes.length > 0) {
                                reason = `لا توجد مقاعد شاغرة في الشق (${emptyTypes.join(' و ')})`;
                            } else {
                                let combos = getCombinations(validOptions, linkedCRNs, crnToType);
                                
                                if (combos.length === 0 && typesCount > 1) {
                                    reason = "وجود تعارض في الشق الآخر (تعارض داخلي بين شعب المقرر نفسه أو عدم تطابق روابط الشعب SF33)";
                                } else {
                                    let specificConflict = null;
                                    for (let combo of combos) {
                                        for (let sec of combo) {
                                            for (let existSec of finalSchedule) {
                                                let conf = getConflictDetail(sec, existSec);
                                                if (conf) { specificConflict = conf; break; }
                                            }
                                            if (specificConflict) break;
                                        }
                                        if (specificConflict) break;
                                    }
                                    reason = specificConflict ? specificConflict : "تعارض أحد شقي المقرر مع مقررات أخرى ولا يمكن تجنبه";
                                }
                            }
                        }
                        courseStats[code].reasons[reason] = (courseStats[code].reasons[reason] || 0) + 1;
                        unregisteredData.push({ [C_TRAINEE_NAME]: traineeName, [C_TRAINEE_ID]: traineeId, 'رمز المقرر': code, 'السبب بالتفصيل': reason });

                        missingCount++;
                        unassignedRow[`المقرر المتبقي ${missingCount}`] = code;
                        unassignedRow[`سبب عدم الإسناد ${missingCount}`] = reason;
                    }
                });

                if (missingCount > 0) {
                    unassignedCodesData.push(unassignedRow);
                    }
                if (finalCodes.length === requiredCourses.length && requiredCourses.length > 0) {
                    stats.fullSuccess++;
                }
                else if (finalCodes.length > 0) {
                    stats.partialSuccess++;
                }
                else {
                    stats.failed++;
                    notAssignedData.push({
                        [C_TRAINEE_NAME]: traineeName,
                        [C_TRAINEE_ID]: traineeId
                    });
                }

                let mainRow = {
                    [C_TRAINEE_NAME]: traineeName,
                    [C_TRAINEE_ID]: traineeId
                };
                studentCrns.forEach((crn, idx) => mainRow[`الرقم المرجعي ${idx + 1}`] = crn);
                mainSheetData.push(mainRow);
                assignedCodesData.push({ [C_TRAINEE_NAME]: traineeName, [C_TRAINEE_ID]: traineeId, 'المقررات المعينة': finalCodes.length > 0 ? finalCodes.join(' ، ') : 'لم يتم تعيين أي مقرر' });
            }
            
            let capacityData = [];
            for (let code in courseOriginalCapacity) {
                let orig = courseOriginalCapacity[code];
                let rem = courseTotalCapacity[code];
                capacityData.push({ 'رمز المقرر': code, 'السعة الأصلية': orig, 'عدد المعين لهم': orig - rem, 'المقاعد المتبقية': rem });
            }

            let courseStatsData = [];
            for (let code in courseStats) {
                let d = courseStats[code];
                if (d.requested > 0) {
                    let topReason = Object.keys(d.reasons).length > 0 ? Object.keys(d.reasons).reduce((a, b) => d.reasons[a] > d.reasons[b] ? a : b) : "لا يوجد";
                    courseStatsData.push({ 'رمز المقرر': code, 'عدد المتوقع': d.requested, 'تم التعيين': d.registered, 'لم يتم التعيين': d.unregistered, 'أبرز سبب لعدم التعيين': topReason });
                }
            }

            let fullSectionsData = [];
            for (let crn in allSectionsRef) {
                if (allSectionsRef[crn].remaining === 0) {
                    fullSectionsData.push({ 'رمز المقرر': allSectionsRef[crn].code, 'الرقم المرجعي': crn, 'النوع': allSectionsRef[crn].type, 'حالة الشعبة': 'ممتلئة تماماً' });
                }
            }

            let globalStatsData = [
                { 'البيان': 'إجمالي المتدربين المعالجين', 'العدد': stats.total },
                { 'البيان': 'مسند لهم بالكامل بنجاح', 'العدد': stats.fullSuccess },
                { 'البيان': 'مسند لهم جزئياً (بقي لهم مقررات)', 'العدد': stats.partialSuccess },
                { 'البيان': 'لم يتم الإسناد لهم مطلقاً', 'العدد': stats.failed }
            ];

            const sheetsToExport = [
                { name: "جدول المتدربين", data: mainSheetData },
                { name: "المقررات المعينة", data: assignedCodesData },
                { name: "المقررات المتبقية", data: unassignedCodesData },
                { name: "غير المسند لهم", data: notAssignedData },
                { name: "أسباب الرفض والتعارض", data: unregisteredData },
                { name: "تقرير السعة", data: capacityData },
                { name: "الشعب الممتلئة", data: fullSectionsData },
                { name: "إحصائيات لكل مقرر", data: courseStatsData },
                { name: "الإحصاء العام", data: globalStatsData }
            ];

            btnText.innerText = 'جار تصدير الملف...';
            await exportToExcel(sheetsToExport, "تقرير_إسناد_الجدولة.xlsx");
            statusDiv.innerHTML = 'تم الانتهاء بنجاح وتحميل الملف تلقائياً!';
        } catch (error) {
            console.error(error);
            statusDiv.innerHTML = `<span class="error">حدث خطأ: ${error.message}</span>`;
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
            btnText.innerText = 'معالجة وبناء الجداول';
        }
    }
</script>
