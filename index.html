<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النظام الذكي لجدولة المتدربين</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body { background-color: #f4f9f8; color: #333; margin: 0; padding: 40px 20px; display: flex; justify-content: center; }
        .container { background-color: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); max-width: 850px; width: 100%; }
        h1 { text-align: center; color: #008e7e; font-size: 26px; margin-bottom: 5px; }
        .version { text-align: center; color: #8dc63f; font-weight: 800; font-size: 14px; margin-bottom: 25px; }
        
        .upload-group { margin-bottom: 20px; background: #fafdfa; border: 2px dashed #8dc63f; padding: 15px; border-radius: 8px; }
        .upload-group label { display: flex; align-items: center; font-weight: 600; margin-bottom: 10px; color: #008e7e; gap: 8px; }
        input[type="file"] { display: block; width: 100%; cursor: pointer; }
        
        .advanced-settings { background: #eef7f6; border: 1px solid #cbe6e3; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .advanced-settings summary { font-weight: 800; color: #006d60; cursor: pointer; outline: none; }
        .settings-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .settings-row div { flex: 1; min-width: 120px; }
        .settings-row input { width: 100%; padding: 5px; border-radius: 4px; border: 1px solid #ccc; text-align: center; }
        
        .btn-process { background-color: #008e7e; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-process:hover { background-color: #006d60; }
        .btn-process:disabled { background-color: #ccc; cursor: not-allowed; }
        
        .progress-container { margin-top: 20px; display: none; flex-direction: column; gap: 8px; }
        .progress-track { width: 100%; height: 12px; background-color: #e0e0e0; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background-color: #8dc63f; width: 0%; transition: width 0.2s; }
        .progress-text { text-align: center; font-size: 14px; font-weight: 600; }
        #status { margin-top: 15px; text-align: center; font-weight: bold; }
        .error { color: #dc3545; }
    </style>
</head>
<body>

<div class="container">
    <h1>النظام الذكي لجدولة المتدربين</h1>

    <details class="advanced-settings">
        <summary>⚙️ إعدادات الأعمدة</summary>
        <div class="settings-row">
            <div><label>رقم المتدرب</label><input type="text" id="col_trainee_id" value="الرقم"></div>
            <div><label>المقرر</label><input type="text" id="col_course" value="المقرر"></div>
            <div><label>المرجعي</label><input type="text" id="col_crn" value="الرقم المرجعي"></div>
            <div><label>النوع</label><input type="text" id="col_type" value="نوع الجدولة"></div>
            <div><label>الوقت</label><input type="text" id="col_time" value="الوقت"></div>
            <div><label>اليوم</label><input type="text" id="col_day" value="اليوم"></div>
            <div><label>المتبقي</label><input type="text" id="col_rem" value="متبقي"></div>
        </div>
    </details>

    <div class="upload-group">
        <label>1. ملف مصفوفة التسجيل (.xlsx)</label>
        <input type="file" id="traineesFile" accept=".xlsx">
    </div>

    <div class="upload-group">
        <label>2. تقرير SS01 (.xlsx)</label>
        <input type="file" id="ss01File" accept=".xlsx">
    </div>

    <button class="btn-process" id="processBtn">بدء المعالجة الذكية</button>

    <div class="progress-container" id="progressContainer">
        <div class="progress-track"><div class="progress-fill" id="progressBar"></div></div>
        <div class="progress-text" id="progressText">0%</div>
    </div>
    <div id="status"></div>
</div>

<script>
    // الإعدادات والحفظ التلقائي
    const inputIds = ['col_trainee_id', 'col_course', 'col_crn', 'col_type', 'col_time', 'col_day', 'col_rem'];
    inputIds.forEach(id => {
        const el = document.getElementById(id);
        el.value = localStorage.getItem(id) || el.value;
        el.oninput = () => localStorage.setItem(id, el.value);
    });

    const DAYS_MAP = { 'الأحد':0, 'الاحد':0, 'الإثنين':1, 'الاثنين':1, 'الثلاثاء':2, 'الأربعاء':3, 'الاربعاء':3, 'الخميس':4 };
    
    // تحويل الوقت إلى Bitmask سريع جداً للفحص
    function getBitmask(dayStr, timeStr) {
        let mask = 0n;
        if (!dayStr || !timeStr) return mask;
        
        let days = [];
        for (let key in DAYS_MAP) if (String(dayStr).includes(key)) days.push(DAYS_MAP[key]);
        
        let parts = String(timeStr).split('-');
        if (parts.length < 2) return mask;

        function toMin(t) {
            let m = t.match(/(\d+):(\d+)/);
            if (!m) return 0;
            let h = parseInt(m[1]), min = parseInt(m[2]);
            if (t.includes('م') && h < 12) h += 12;
            if (t.includes('ص') && h === 12) h = 0;
            return h * 60 + min;
        }

        let start = toMin(parts[0]), end = toMin(parts[1]);
        // تمثيل كل 5 دقائق بـ Bit واحد لتقليل العمليات
        for (let d of days) {
            for (let t = Math.floor(start/5); t < Math.ceil(end/5); t++) {
                mask |= (1n << BigInt(d * 288 + t));
            }
        }
        return mask;
    }

    async function processExcel(file) {
        const data = await file.arrayBuffer();
        const workbook = XLSX.read(data);
        return XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {defval: ""});
    }

    document.getElementById('processBtn').onclick = async () => {
        const tFile = document.getElementById('traineesFile').files[0];
        const sFile = document.getElementById('ss01File').files[0];
        if (!tFile || !sFile) return alert("يرجى اختيار الملفات!");

        const btn = document.getElementById('processBtn');
        const prog = document.getElementById('progressContainer');
        const progBar = document.getElementById('progressBar');
        const progText = document.getElementById('progressText');
        const status = document.getElementById('status');

        btn.disabled = true;
        prog.style.display = 'flex';
        status.innerText = "جاري القراءة...";

        try {
            const [tRaw, sRaw] = await Promise.all([processExcel(tFile), processExcel(sFile)]);
            
            const cols = {};
            inputIds.forEach(id => cols[id] = document.getElementById(id).value.trim());

            // 1. تنظيم بيانات الشعب (SS01)
            let courseMap = {};
            sRaw.forEach(row => {
                let code = row[cols.col_course], crn = row[cols.col_crn];
                if (!code || !crn) return;
                if (!courseMap[code]) courseMap[code] = {};
                let type = row[cols.col_type] || "عام";
                if (!courseMap[code][type]) courseMap[code][type] = [];
                
                courseMap[code][type].push({
                    crn, code, type,
                    rem: parseInt(row[cols.col_rem]) || 0,
                    mask: getBitmask(row[cols.col_day], row[cols.col_time]),
                    rawDay: row[cols.col_day],
                    rawTime: row[cols.col_time]
                });
            });

            // 2. تنظيم بيانات المتدربين
            let trainees = tRaw.map(row => {
                let req = [];
                for (let key in row) if (key !== cols.col_trainee_id && row[key] == "1") req.push(key);
                return { id: row[cols.col_trainee_id], req };
            }).filter(t => t.id && t.req.length > 0);

            let finalResults = [];
            let unregResults = [];

            // 3. الجدولة الذكية لكل متدرب
            for (let i = 0; i < trainees.length; i++) {
                let trainee = trainees[i];
                
                // MRV: ترتيب المقررات حسب الأقل توفراً (عدد الشعب)
                let sortedReq = trainee.req
                    .filter(c => courseMap[c])
                    .sort((a, b) => {
                        let countA = Object.values(courseMap[a])[0]?.length || 0;
                        let countB = Object.values(courseMap[b])[0]?.length || 0;
                        return countA - countB;
                    });

                let bestSchedule = null;
                let minPenalty = Infinity;

                // Branch & Bound Solver
                function solve(courseIdx, currentMask, currentSections, penalty) {
                    if (penalty >= minPenalty) return; // Pruning (قص الفروع غير المجدية)

                    if (courseIdx === sortedReq.length) {
                        if (penalty < minPenalty) {
                            minPenalty = penalty;
                            bestSchedule = [...currentSections];
                        }
                        return;
                    }

                    let courseCode = sortedReq[courseIdx];
                    let types = Object.keys(courseMap[courseCode]);

                    // دالة مساعدة لتجربة توافيق الأنواع (نظري/عملي)
                    function pickTypes(typeIdx, innerMask, innerSections) {
                        if (typeIdx === types.length) {
                            solve(courseIdx + 1, innerMask, innerSections, penalty);
                            return;
                        }
                        
                        let typeName = types[typeIdx];
                        for (let sec of courseMap[courseCode][typeName]) {
                            if (sec.rem > 0 && (innerMask & sec.mask) === 0n) {
                                // حساب Penalty بسيط: يفضل الشعب ذات السعة الأعلى
                                let p = (100 / (sec.rem + 1)); 
                                pickTypes(typeIdx + 1, innerMask | sec.mask, [...innerSections, sec], penalty + p);
                            }
                        }
                    }
                    pickTypes(0, currentMask, currentSections);
                }

                solve(0, 0n, [], 0);

                if (bestSchedule) {
                    bestSchedule.forEach(s => {
                        s.rem--; // حجز مقعد
                        finalResults.push({
                            'رقم المتدرب': trainee.id,
                            'المقرر': s.code,
                            'المرجعي': s.crn,
                            'النوع': s.type,
                            'اليوم': s.rawDay,
                            'الوقت': s.rawTime
                        });
                    });
                } else {
                    unregResults.push({ 'رقم المتدرب': trainee.id, 'السبب': 'تعارض زمن أو نفاذ مقاعد' });
                }

                if (i % 5 === 0) {
                    let p = Math.round((i / trainees.length) * 100);
                    progBar.style.width = p + '%';
                    progText.innerText = p + '%';
                }
                if (i % 20 === 0) await new Promise(r => setTimeout(r, 0));
            }

            // 4. تصدير النتائج
            const wb = new ExcelJS.Workbook();
            const ws1 = wb.addWorksheet("الجداول النهائية");
            ws1.addRow(Object.keys(finalResults[0] || {}));
            finalResults.forEach(r => ws1.addRow(Object.values(r)));

            const ws2 = wb.addWorksheet("لم يتم جدولتها");
            ws2.addRow(Object.keys(unregResults[0] || {}));
            unregResults.forEach(r => ws2.addRow(Object.values(r)));

            const buffer = await wb.xlsx.writeBuffer();
            saveAs(new Blob([buffer]), "تقرير_الجدولة.xlsx");

            status.innerHTML = `<span style="color:green">تمت المعالجة بنجاح! تم تحميل الملف.</span>`;
        } catch (err) {
            console.error(err);
            status.innerHTML = `<span class="error">خطأ: ${err.message}</span>`;
        } finally {
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
